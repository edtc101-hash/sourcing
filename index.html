<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ttt hardware - 소싱 관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap');

  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-alt: #f5f5f5;
    --text-primary: #1a1a1a;
    --text-secondary: #767676;
    --text-muted: #b0b0b0;
    --border: #e8e8e8;
    --border-light: #f0f0f0;
    --accent: #1a1a1a;
    --accent-soft: rgba(26,26,26,0.06);
    --green: #2d8a4e;
    --orange: #c2760a;
    --blue: #2563eb;
    --red: #dc2626;
    --radius: 8px;
    --radius-lg: 12px;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-alt: #1a1a1a;
      --text-primary: #e8e8e8;
      --text-secondary: #888888;
      --text-muted: #555555;
      --border: #2a2a2a;
      --border-light: #1e1e1e;
      --accent: #e8e8e8;
      --accent-soft: rgba(232,232,232,0.06);
      --green: #4ade80;
      --orange: #fb923c;
      --blue: #60a5fa;
      --red: #f87171;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Noto Sans KR', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }
  .header-actions { display: flex; align-items: center; gap: 20px; }
  .header-link {
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
    background: none; border: none; font-family: inherit;
  }
  .header-link:hover { color: var(--text-primary); }

  /* ── Page Title ── */
  .page-title-section {
    padding: 48px 40px 32px;
  }
  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .page-desc {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 300;
  }

  /* ── KPI Strip ── */
  .kpi-strip {
    display: flex;
    gap: 0;
    padding: 0 40px;
    margin-bottom: 32px;
  }
  .kpi-item {
    padding: 16px 28px 16px 0;
  }
  .kpi-item:last-child { padding-right: 0; }
  .kpi-item:first-child { padding-left: 0; }
  .kpi-num { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  .kpi-num.green { color: var(--green); }
  .kpi-num.orange { color: var(--orange); }
  .kpi-num.blue { color: var(--blue); }
  .kpi-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }

  /* ── Layout: Sidebar + Grid ── */
  .main-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 0;
    padding: 0 40px;
    min-height: 60vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    padding-right: 32px;
    border-right: 1px solid var(--border-light);
    position: sticky;
    top: 80px;
    align-self: start;
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }
  .sidebar-section { margin-bottom: 24px; }
  .sidebar-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .sidebar-title .arrow { font-size: 10px; color: var(--text-muted); }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: color 0.15s;
  }
  .sidebar-item:hover { color: var(--text-primary); }
  .sidebar-item.active { color: var(--text-primary); font-weight: 500; }
  .sidebar-item .count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
  }
  .sidebar-check {
    width: 14px; height: 14px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .sidebar-item.active .sidebar-check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .sidebar-item.active .sidebar-check::after {
    content: '';
    width: 6px; height: 6px;
    background: var(--bg);
    border-radius: 1px;
  }
  .sidebar-divider { height: 1px; background: var(--border-light); margin: 16px 0; }

  .search-input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  /* ── Sort Bar ── */
  .sort-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 0 0 16px 32px;
  }
  .sort-select {
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
  }

  /* ── Product Grid ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 20px 16px;
    padding-left: 32px;
    padding-bottom: 80px;
  }

  /* ── Product Card — Framer-style animations ── */
  .product-card {
    cursor: default;
    opacity: 0;
    transform: translateY(24px) scale(0.97);
    transition: opacity 0.6s var(--ease), transform 0.6s var(--ease), box-shadow 0.4s var(--ease);
  }
  .product-card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .product-card:hover {
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    transform: translateY(-3px) scale(1);
  }
  .product-card.visible:hover {
    transform: translateY(-3px) scale(1.01);
  }

  /* Stagger children inside card */
  .product-card .card-info,
  .product-card .card-cat,
  .product-card .spec-group,
  .product-card .card-meta,
  .product-card .card-actions {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
  }
  .product-card.visible .card-info { transition-delay: 0.08s; opacity: 1; transform: none; }
  .product-card.visible .card-cat { transition-delay: 0.12s; opacity: 1; transform: none; }
  .product-card.visible .spec-group:nth-child(1) { transition-delay: 0.16s; opacity: 1; transform: none; }
  .product-card.visible .spec-group:nth-child(2) { transition-delay: 0.2s; opacity: 1; transform: none; }
  .product-card.visible .spec-group:nth-child(3) { transition-delay: 0.24s; opacity: 1; transform: none; }
  .product-card.visible .spec-group:nth-child(n+4) { transition-delay: 0.28s; opacity: 1; transform: none; }
  .product-card.visible .card-meta { transition-delay: 0.3s; opacity: 1; transform: none; }
  .product-card.visible .card-actions { transition-delay: 0.34s; opacity: 1; transform: none; }

  /* Card image zoom on hover */
  .card-image .icon,
  .card-image img {
    transition: transform 0.5s var(--ease);
  }
  .product-card:hover .card-image .icon,
  .product-card:hover .card-image img {
    transform: scale(1.05);
  }

  /* KPI counter animation */
  .kpi-num {
    transition: all 0.4s var(--ease);
  }

  /* Smooth badge hover */
  .card-badge {
    transition: transform 0.3s var(--ease), opacity 0.3s;
  }
  .product-card:hover .card-badge {
    transform: scale(1.05);
  }

  /* Sidebar item hover micro-interaction */
  .sidebar-item {
    transition: color 0.15s, transform 0.2s var(--ease), background 0.2s;
  }
  .sidebar-item:hover {
    transform: translateX(3px);
  }

  /* Spec tag hover */
  .spec-tag {
    transition: background 0.2s, transform 0.2s var(--ease);
  }
  .spec-tag:hover {
    background: color-mix(in srgb, var(--accent-soft) 80%, var(--accent));
    transform: translateY(-1px);
  }

  /* Modal entrance */
  .modal {
    animation: modalIn 0.35s var(--ease);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: none; }
  }

  /* Header links */
  .header-link {
    transition: color 0.2s, transform 0.15s;
  }
  .header-link:hover {
    transform: translateY(-1px);
  }

  /* Action links underline animation */
  .action-link {
    text-decoration: none;
    position: relative;
  }
  .action-link::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 0;
    height: 1px;
    background: currentColor;
    transition: width 0.25s var(--ease);
  }
  .action-link:hover::after { width: 100%; }

  .card-image {
    width: 100%;
    height: 140px;
    background: var(--surface-alt);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 10px;
    transition: opacity 0.3s;
    cursor: pointer;
    flex-shrink: 0;
  }
  .card-image:hover { opacity: 0.88; }
  .card-image .icon { font-size: 48px; opacity: 0.45; filter: grayscale(0.3); }
  .card-image img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .card-image .paste-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.5); color: #fff; font-size: 11px;
    opacity: 0; transition: opacity 0.2s;
  }
  .card-image:hover .paste-hint { opacity: 1; }

  /* Multi-image grid in form */
  .img-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: auto auto;
    gap: 8px;
  }
  .img-slot {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
    background: var(--surface-alt);
  }
  .img-slot:focus, .img-slot:hover { border-color: var(--accent); }
  .img-slot.has-img { border-style: solid; }
  .img-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .img-slot .img-slot-add { font-size: 20px; color: var(--text-muted); opacity: 0.5; }
  .img-slot .img-slot-del {
    position: absolute; top: 2px; right: 2px;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(0,0,0,0.6); color: #fff; border: none;
    font-size: 11px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .img-slot:hover .img-slot-del { opacity: 1; }
  .img-grid-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .img-slot-file { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .img-slot .pdf-icon { font-size: 24px; opacity: 0.7; }
  .img-slot .pdf-name { font-size: 9px; color: var(--text-muted); text-align: center; padding: 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
  .img-count {
    position: absolute; bottom: 6px; right: 6px;
    background: rgba(0,0,0,0.65); color: #fff;
    font-size: 10px; font-weight: 600; padding: 2px 6px;
    border-radius: 4px;
  }
  .card-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }
  .badge-confirmed { background: var(--accent); color: var(--bg); }
  .badge-exploring { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); }
  .badge-sample { background: #fef3c7; color: #92400e; }
  .badge-ordered { background: #d1fae5; color: #065f46; }

  .card-content { padding: 12px 14px 0; }
  .card-info { margin-bottom: 2px; }
  .card-name { font-size: 13px; font-weight: 500; display: block; }
  .card-price { font-size: 11px; color: var(--green); display: block; margin-top: 2px; word-break: break-word; }
  .card-cat { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; }

  .spec-group { margin-bottom: 6px; }
  .spec-group-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    margin-bottom: 3px;
  }
  .spec-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 2px;
  }
  .spec-tag {
    font-size: 10px;
    color: var(--text-secondary);
    background: var(--accent-soft);
    padding: 2px 7px;
    border-radius: 4px;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  /* Internal detail panel */
  .card-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s var(--ease);
  }
  .card-detail.open { max-height: 400px; }
  .detail-inner {
    padding-top: 10px;
    border-top: 1px solid var(--border-light);
    margin-top: 8px;
  }
  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
  }
  .detail-row .dl { color: var(--text-muted); }
  .detail-row .dv { color: var(--text-primary); font-weight: 500; }
  .detail-row .dv.price { color: var(--green); }

  .progress-track {
    height: 3px;
    background: var(--border-light);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s var(--ease);
  }
  .detail-memo { font-weight: 600;
    font-size: 11px;
    color: var(--text-primary);
    margin-top: 8px;
    line-height: 1.6;
    background: var(--accent-soft);
    padding: 8px 10px;
    border-radius: var(--radius);
  }

  .card-actions {
    display: flex;
    gap: 12px;
    margin-top: 10px;
    padding: 8px 14px 14px;
  }
  .action-link {
    font-size: 11px;
    color: var(--text-muted);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    transition: color 0.15s;
  }
  .action-link:hover { color: var(--text-primary); }
  .action-link.danger:hover { color: var(--red); }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-size: 24px;
    font-weight: 300;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transition: all 0.25s;
    z-index: 80;
    display: flex; align-items: center; justify-content: center;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }

  /* ── Image Paste Popup ── */
  .paste-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 250;
    align-items: center;
    justify-content: center;
  }
  .paste-overlay.show { display: flex; }
  .paste-popup {
    background: var(--bg);
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 48px;
    text-align: center;
    max-width: 400px;
    width: 90vw;
    outline: none;
    animation: modalIn 0.3s var(--ease);
    transition: border-color 0.2s;
  }
  .paste-popup:focus { border-color: var(--accent); }
  .paste-popup .paste-icon { font-size: 48px; margin-bottom: 12px; }
  .paste-popup .paste-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .paste-popup .paste-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
  .paste-popup .paste-preview { margin-top: 12px; }
  .paste-popup .paste-preview img { max-width: 100%; max-height: 200px; border-radius: var(--radius); }
  .paste-popup .paste-status { font-size: 12px; margin-top: 10px; color: var(--green); font-weight: 600; }
  .paste-popup .paste-cancel {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: min(520px, 92vw);
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
  }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 400; margin-bottom: 24px; }
  .form-section { margin-bottom: 20px; }
  .form-section-title {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border-light);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
  .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 56px; }
  .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
  .modal-actions button {
    flex: 1; padding: 10px; border-radius: var(--radius); border: 1px solid var(--border);
    font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-cancel { background: transparent; color: var(--text-secondary); }
  .btn-cancel:hover { background: var(--accent-soft); }
  .btn-save { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn-save:hover { opacity: 0.88; }

  /* ── Confirm ── */
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; }
  .confirm-overlay.show { display: flex; }
  .confirm-box { background: var(--bg); border-radius: var(--radius-lg); padding: 28px; text-align: center; max-width: 320px; }
  .confirm-box p { font-size: 14px; margin-bottom: 20px; }
  .confirm-box .actions { display: flex; gap: 12px; }
  .confirm-box button { flex: 1; padding: 8px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 13px; cursor: pointer; font-family: inherit; }
  .confirm-box .btn-danger { background: var(--red); color: #fff; border-color: var(--red); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); grid-column: 1 / -1; }
  .empty-state .icon { font-size: 40px; margin-bottom: 8px; opacity: 0.5; }

  @media (max-width: 1400px) {
    .product-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 1100px) {
    .product-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 900px) {
    .main-layout { grid-template-columns: 1fr; }

let items = [];
let activeCat = null;
let activeStage = null;

// ===== IndexedDB for reliable large data storage =====
const DB_NAME = 'infam-sourcing-db';
const DB_STORE = 'data';
function openDB() {
  return new Promise(function(resolve, reject) {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = function(e) { e.target.result.createObjectStore(DB_STORE); };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function() { reject(); };
  });
}
async function loadData() {
  // 1. IndexedDB에서 로드
  try {
    const db = await openDB();
    const tx = db.transaction(DB_STORE, 'readonly');
    const store = tx.objectStore(DB_STORE);
    const req = store.get('items');
    const saved = await new Promise(function(r) { req.onsuccess = function() { r(req.result); }; req.onerror = function() { r(null); }; });
    if (saved && saved.length) { items = saved; return; }
  } catch(e) {}

  // 2. data.json 파일에서 로드 (배포 시 이미지 포함 데이터)
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      if (data && data.length) { items = data; await saveData(); return; }
    }
  } catch(e) {}

  // 3. localStorage 폴백
  const ls = localStorage.getItem(STORAGE_KEY);
  items = ls ? JSON.parse(ls) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  await saveData();
}
async function saveData() {
  try {
    const db = await openDB();
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(items, 'items');
    await new Promise(function(r) { tx.oncomplete = r; tx.onerror = r; });
  } catch(e) {
    // Fallback to localStorage (may fail with large images)
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch(e2) {}
  }
}

// ===== Image compression (resize to max 400px) =====
function compressImage(dataUrl, maxSize) {
  maxSize = maxSize || 400;
  return new Promise(function(resolve) {
    const img = new Image();
    img.onload = function() {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.onerror = function() { resolve(dataUrl); };
    img.src = dataUrl;
  });
}

    const count = items.filter(i => i.cat === c).length;
    return `<div class="sidebar-item ${activeCat===c ? 'active' : ''}" onclick="setCat('${c}')">
      <span class="sidebar-check"></span>${c}<span class="count">${count}</span>
    </div>`;
  }).join('');

  // Stages
  const stageDiv = document.getElementById('stageFilters');
  stageDiv.innerHTML = `<div class="sidebar-item ${!activeStage ? 'active' : ''}" onclick="setStage(null)">
    <span class="sidebar-check"></span>All
  </div>` + STAGE_ORDER.map(s => {
    const count = items.filter(i => i.stage === s).length;
    if (count === 0) return '';
    return `<div class="sidebar-item ${activeStage===s ? 'active' : ''}" onclick="setStage('${s}')">
      <span class="sidebar-check"></span>${s}<span class="count">${count}</span>
    </div>`;
  }).join('');
}

function setCat(c) { activeCat = c; buildSidebar(); render(); }
function setStage(s) { activeStage = s; buildSidebar(); render(); }

function render() {
  const grid = document.getElementById('productGrid');
  const search = document.getElementById('searchBox').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let filtered = items.map((item, idx) => ({...item, _idx: idx})).filter(item => {
    if (activeCat && item.cat !== activeCat) return false;
    if (activeStage && item.stage !== activeStage) return false;
    if (search) {
      const h = [item.cat, item.sub, item.model, item.supplier, item.note, item.pmemo, item.color, item.otherSpec].join(' ').toLowerCase();
      if (!h.includes(search)) return false;
    }
    return true;
  });

  if (sort === 'stage') filtered.sort((a,b) => STAGE_ORDER.indexOf(a.stage) - STAGE_ORDER.indexOf(b.stage));
  if (sort === 'name') filtered.sort((a,b) => (a.sub||a.cat).localeCompare(b.sub||b.cat));

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>표시할 제품이 없습니다</p></div>';
    updateKPI();
    return;
  }

  grid.innerHTML = filtered.map((item, i) => {
    const icon = CAT_ICONS[item.cat] || '📦';
    const stageIdx = STAGE_ORDER.indexOf(item.stage);
    const progress = Math.round(((stageIdx + 1) / STAGE_ORDER.length) * 100);

    let badgeClass = 'badge-exploring';
    if (['업체확정','발주준비'].includes(item.stage)) badgeClass = 'badge-confirmed';
    if (['샘플요청','샘플수령','품질검수'].includes(item.stage)) badgeClass = 'badge-sample';
    if (item.stage === '발주완료') badgeClass = 'badge-ordered';

    // Build spec groups
    const specGroups = [];
    if (item.depth) specGroups.push({ label: '깊이', tags: item.depth.split(',').map(d => d.trim()+'mm') });
    if (item.side || item.back) {
      const ht = [];
      if (item.side) ht.push('Side ' + item.side + 'mm');
      if (item.back) item.back.split(',').forEach(b => ht.push('Back ' + b.trim() + 'mm'));
      specGroups.push({ label: '높이', tags: ht });
    }
    if (item.otherSpec) specGroups.push({ label: '규격', tags: [item.otherSpec] });
    if (item.install) specGroups.push({ label: '설치', tags: item.install.split(',').map(t => t.trim()) });
    if (item.color) specGroups.push({ label: '색상', tags: item.color.split(',').map(c => c.trim()) });
    if (item.material) specGroups.push({ label: '재질', tags: [item.material] });

    const memos = [item.pmemo, item.smemo, item.note].filter(Boolean);

    return `<div class="product-card" style="animation-delay:${i*0.03}s">
      <div class="card-image" onclick="pasteImageToCard(${item._idx})" tabindex="0" data-idx="${item._idx}">
        ${(function(){ const imgs = (item.images && item.images.length) ? item.images : (item.img ? [item.img] : []); return imgs.length ? '<img src="'+imgs[0]+'">' + (imgs.length > 1 ? '<span class="img-count">'+imgs.length+'장</span>' : '') : '<span class="icon">'+icon+'</span>'; })()}
        <span class="card-badge ${badgeClass}">${item.stage}</span>
        <div class="paste-hint">${((item.images && item.images.length) || item.img) ? '클릭하면 이미지 관리' : '클릭하면 이미지 붙여넣기'}</div>
      </div>
      <div class="card-content">
        <div class="card-info">
          <span class="card-name">${item.sub || item.cat}</span>
          <span class="card-price">${item.price || ''}</span>
        </div>
        <div class="card-cat">${item.cat}${item.model ? ' · ' + item.model : ''}</div>
        ${specGroups.map(g => `<div class="spec-group">
          <span class="spec-group-label">${g.label}</span>
          <div class="spec-tags">${g.tags.map(t => `<span class="spec-tag">${t}</span>`).join('')}</div>
        </div>`).join('')}
        ${item.supplier && item.supplier !== '미정' ? `<div class="card-meta">업체: ${item.supplier}${item.leadtime ? ' · ' + item.leadtime : ''}</div>` : ''}
        <div class="card-detail" id="detail-${item._idx}">
          <div class="detail-inner">
            <div class="detail-row"><span class="dl">업체</span><span class="dv">${item.supplier || '-'}${item.wechat ? ' ('+item.wechat+')' : ''}</span></div>
            ${item.moq ? `<div class="detail-row"><span class="dl">MOQ</span><span class="dv">${item.moq}</span></div>` : ''}
            ${item.price ? `<div class="detail-row"><span class="dl">단가</span><span class="dv price">${item.price}</span></div>` : ''}
            ${item.leadtime ? `<div class="detail-row"><span class="dl">제작기간</span><span class="dv">${item.leadtime}</span></div>` : ''}
            <div class="detail-row"><span class="dl">진행</span><span class="dv">${item.stage} (${progress}%)</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
            ${memos.length ? `<div class="detail-memo">${memos.join('\n')}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="action-link" onclick="toggleDetail(${item._idx})">해결과제</button>
        <button class="action-link" onclick="openModal(${item._idx})">Edit</button>
        <button class="action-link danger" onclick="confirmDelete(${item._idx})">Delete</button>
      </div>
    </div>`;
  }).join('');

  updateKPI();
  requestAnimationFrame(function() { if (typeof observeCards === 'function') observeCards(); });
}

function toggleDetail(idx) {
  document.getElementById('detail-' + idx).classList.toggle('open');
}

function openModal(idx) {
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('editIdx').value = idx !== undefined ? idx : -1;
  document.getElementById('modalTitle').textContent = idx !== undefined ? 'Edit Product' : 'Add Product';
  if (idx !== undefined) {
    const item = items[idx];
    document.getElementById('f_cat').value = item.cat;
    document.getElementById('f_sub').value = item.sub || '';
    document.getElementById('f_model').value = item.model || '';
    document.getElementById('f_material').value = item.material || '';
    document.getElementById('f_depth').value = item.depth || '';
    document.getElementById('f_side').value = item.side || '';
    document.getElementById('f_back').value = item.back || '';
    document.getElementById('f_otherSpec').value = item.otherSpec || '';
    document.getElementById('f_install').value = item.install || '';
    document.getElementById('f_color').value = item.color || '';
    formImages = getItemImages(item);
    formImageNames = (item.imageNames || []).slice();
    buildImageGrid();
    document.getElementById('f_supplier').value = item.supplier || '';
    document.getElementById('f_wechat').value = item.wechat || '';
    document.getElementById('f_confirmed').value = item.confirmed || 'N';
    document.getElementById('f_moq').value = item.moq || '';
    document.getElementById('f_price').value = item.price || '';
    document.getElementById('f_leadtime').value = item.leadtime || '';
    document.getElementById('f_stage').value = item.stage || '탐색중';
    document.getElementById('f_sample').value = item.sample || '미요청';
    document.getElementById('f_pmemo').value = item.pmemo || '';
    document.getElementById('f_smemo').value = item.smemo || '';
    document.getElementById('f_note').value = item.note || '';
  } else {
    document.querySelectorAll('.modal input:not([type=hidden]), .modal textarea').forEach(el => el.value = '');
    document.getElementById('f_cat').value = '서랍재';
    document.getElementById('f_confirmed').value = 'N';
    document.getElementById('f_stage').value = '탐색중';
    document.getElementById('f_sample').value = '미요청';
    formImages = [];
    formImageNames = [];
    buildImageGrid();
  }
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

async function saveItem() {
  const idx = parseInt(document.getElementById('editIdx').value);
  const obj = {
    cat: document.getElementById('f_cat').value, sub: document.getElementById('f_sub').value,
    model: document.getElementById('f_model').value, material: document.getElementById('f_material').value,
    depth: document.getElementById('f_depth').value, side: document.getElementById('f_side').value,
    back: document.getElementById('f_back').value, otherSpec: document.getElementById('f_otherSpec').value,
    install: document.getElementById('f_install').value, color: document.getElementById('f_color').value,
    images: formImages.filter(Boolean), imageNames: formImageNames.filter(Boolean), img: formImages[0] || '', pmemo: document.getElementById('f_pmemo').value,
    supplier: document.getElementById('f_supplier').value, wechat: document.getElementById('f_wechat').value,
    confirmed: document.getElementById('f_confirmed').value, moq: document.getElementById('f_moq').value,
    price: document.getElementById('f_price').value, leadtime: document.getElementById('f_leadtime').value,
    stage: document.getElementById('f_stage').value, sample: document.getElementById('f_sample').value,
    smemo: document.getElementById('f_smemo').value, note: document.getElementById('f_note').value
  };
  if (idx >= 0) items[idx] = obj; else items.push(obj);
  await saveData(); closeModal(); buildSidebar(); render();
}

let deleteIdx = -1;
function confirmDelete(idx) {
  deleteIdx = idx;
  document.getElementById('confirmMsg').textContent = `"${items[idx].sub || items[idx].cat}" 을(를) 삭제하시겠습니까?`;
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('show'); deleteIdx = -1; }
document.getElementById('confirmBtn').onclick = function() {
  if (deleteIdx >= 0) { items.splice(deleteIdx, 1); saveData(); buildSidebar(); render(); }
  closeConfirm();
};

function exportJSON() {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'infam-sourcing-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
}
async function saveForDeploy() {
  // 이미지를 300px로 압축하여 data.json으로 다운로드 (배포용)
  const compressed = [];
  for (const item of items) {
    const copy = {...item};
    delete copy._idx;
    if (copy.images && copy.images.length) {
      const compressed = [];
      for (const im of copy.images) {
        if (im.startsWith('data:image/')) compressed.push(await compressImage(im, 300));
        else compressed.push(im);
      }
      copy.images = compressed;
      copy.img = compressed[0] || '';
    } else if (copy.img && copy.img.startsWith('data:image/')) {
      copy.img = await compressImage(copy.img, 300);
    }
    compressed.push(copy);
  }
  const blob = new Blob([JSON.stringify(compressed)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'data.json'; a.click();
}
function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) { try { items = JSON.parse(ev.target.result); saveData(); buildSidebar(); render(); } catch(err) {} };
  reader.readAsText(file); e.target.value = '';
}

async function syncFromSheet() {
  // data.json에서 강제 새로고침 (IndexedDB 덮어쓰기)
  try {
    const res = await fetch('./data.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      if (data && data.length) {
        items = data;
        await saveData();
        buildSidebar(); render();
        return;
      }
    }
  } catch(e) {}

  // Apps Script 폴백
  if (APPS_SCRIPT_URL) {
    try {
      const res = await fetch(APPS_SCRIPT_URL + '?action=list');
      const data = await res.json();
      if (data.success) {
        items = data.products.map((p, i) => {
          const s = data.sourcing[i] || {};
          return { cat: p['제품군']||'', sub: p['세부품목']||'', model: p['모델명']||'',
            depth: String(p['깊이(mm)']||''), side: String(p['사이드높이(mm)']||''), back: String(p['백높이(mm)']||''),
            otherSpec: p['기타규격']||'', color: p['색상']||'', material: p['재질']||'',
            install: p['설치타입']||'', img: p['이미지URL']||'', pmemo: p['제품메모']||'',
            supplier: s['업체명']||'', wechat: s['위챗ID']||'', confirmed: s['업체확정']||'N',
            moq: s['MOQ']||'', price: s['단가(RMB)']||'', leadtime: s['제작기간']||'',
            stage: s['소싱단계']||'탐색중', sample: s['샘플상태']||'미요청', smemo: s['진행메모']||'', note: s['비고']||'' };
        });
        await saveData(); buildSidebar(); render();
      }
    } catch(e) {}
  }
}

// ===== MULTI-IMAGE (max 5) =====
let formImages = []; // 현재 폼에서 편집 중인 이미지 배열

function getItemImages(item) {
  // 호환: 기존 img(문자열) → images 배열로 변환
  if (item.images && item.images.length) return item.images.slice();
  if (item.img) return [item.img];
  return [];
}

function buildImageGrid() {
  const grid = document.getElementById('f_img_grid');
  let html = '';
  for (let i = 0; i < 10; i++) {
    const src = formImages[i] || '';
    if (src) {
      const isPdf = src.startsWith('data:application/pdf');
      if (isPdf) {
        const name = formImageNames[i] || 'PDF';
        html += '<div class="img-slot has-img" tabindex="0" data-slot="'+i+'" style="flex-direction:column;gap:2px">' +
          '<span class="pdf-icon">📄</span><span class="pdf-name">'+name+'</span>' +
          '<button type="button" class="img-slot-del" onclick="removeFormImage(event,'+i+')">&times;</button>' +
          '</div>';
      } else {
        html += '<div class="img-slot has-img" tabindex="0" data-slot="'+i+'">' +
          '<img src="'+src+'">' +
          '<button type="button" class="img-slot-del" onclick="removeFormImage(event,'+i+')">&times;</button>' +
          '</div>';
      }
    } else {
      html += '<div class="img-slot" tabindex="0" data-slot="'+i+'">' +
        '<span class="img-slot-add">+</span></div>';
    }
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.img-slot').forEach(function(slot) {
    slot.addEventListener('paste', handleSlotPaste);
    slot.addEventListener('click', function(e) {
      if (e.target.classList.contains('img-slot-del')) return;
      const idx = parseInt(this.getAttribute('data-slot'));
      // 빈 슬롯이면 파일 선택, 이미 있으면 포커스(Ctrl+V 대기)
      if (!formImages[idx]) {
        openFilePickerForSlot(idx);
      } else {
        this.focus();
      }
    });
  });
}

let formImageNames = []; // PDF 파일명 추적

function openFilePickerForSlot(slotIdx) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*,application/pdf';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(ev) {
      if (file.type.startsWith('image/')) {
        formImages[slotIdx] = await compressImage(ev.target.result, 400);
        formImageNames[slotIdx] = file.name;
      } else {
        // PDF는 base64로 저장
        formImages[slotIdx] = ev.target.result;
        formImageNames[slotIdx] = file.name;
      }
      buildImageGrid();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function handleSlotPaste(e) {
  const slotIdx = parseInt(this.getAttribute('data-slot'));
  const ci = e.clipboardData.items;
  for (let i = 0; i < ci.length; i++) {
    if (ci[i].type.startsWith('image/')) {
      const blob = ci[i].getAsFile();
      const reader = new FileReader();
      reader.onload = async function(ev) {
        const compressed = await compressImage(ev.target.result, 400);
        formImages[slotIdx] = compressed;
        buildImageGrid();
      };
      reader.readAsDataURL(blob);
      e.preventDefault();
      return;
    }
  }
}

function removeFormImage(e, idx) {
  e.stopPropagation();
  formImages.splice(idx, 1);
  buildImageGrid();
}

// Card image paste — 클릭하면 팝업 열기, Ctrl+V로 붙여넣기
let pasteTargetIdx = -1;
function pasteImageToCard(idx) {
  pasteTargetIdx = idx;
  document.getElementById('pastePreview').innerHTML = '';
  document.getElementById('pasteStatus').textContent = '';
  document.getElementById('pasteOverlay').classList.add('show');
  setTimeout(() => document.getElementById('pastePopup').focus(), 100);
}
function closePastePopup() {
  document.getElementById('pasteOverlay').classList.remove('show');
  pasteTargetIdx = -1;
}
document.getElementById('pastePopup').addEventListener('paste', async function(e) {
  const ci = e.clipboardData.items;
  for (let i = 0; i < ci.length; i++) {
    if (ci[i].type.startsWith('image/')) {
      const blob = ci[i].getAsFile();
      const reader = new FileReader();
      reader.onload = async function(ev) {
        const compressed = await compressImage(ev.target.result, 400);
        // 프리뷰 표시
        document.getElementById('pastePreview').innerHTML = '<img src="'+compressed+'">';
        document.getElementById('pasteStatus').textContent = '이미지 적용 완료!';
        // 저장 (images 배열에 추가)
        if (pasteTargetIdx >= 0) {
          if (!items[pasteTargetIdx].images) items[pasteTargetIdx].images = getItemImages(items[pasteTargetIdx]);
          if (items[pasteTargetIdx].images.length < 10) {
            items[pasteTargetIdx].images.push(compressed);
          } else {
            items[pasteTargetIdx].images[0] = compressed; // 꽉 차면 첫 번째 교체
          }
          items[pasteTargetIdx].img = items[pasteTargetIdx].images[0] || '';
          await saveData();
        }
        // 1초 후 팝업 닫기
        setTimeout(() => { closePastePopup(); render(); observeCards(); }, 800);
      };
      reader.readAsDataURL(blob);
      e.preventDefault();
      return;
    }
  }
  document.getElementById('pasteStatus').textContent = '클립보드에 이미지가 없습니다';
  document.getElementById('pasteStatus').style.color = 'var(--red)';
  setTimeout(() => { document.getElementById('pasteStatus').style.color = ''; }, 2000);
});
// ESC로 팝업 닫기
document.getElementById('pasteOverlay').addEventListener('click', function(e) {
  if (e.target === this) closePastePopup();
});

// ===== SCROLL ANIMATION (IntersectionObserver) =====
function observeCards() {
  const observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry, i) {
      if (entry.isIntersecting) {
        // Stagger delay based on position in viewport batch
        const delay = Array.from(entry.target.parentElement.children).indexOf(entry.target) % 6 * 60;
        setTimeout(function() { entry.target.classList.add('visible'); }, delay);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.product-card:not(.visible)').forEach(function(card) {
    observer.observe(card);
  });
}

// Override render to also trigger scroll observation
const _origRender = render;
const _patchedRender = function() {
  _origRender();
  requestAnimationFrame(observeCards);
};
// Patch: replace render calls at init
(async function() {
  await loadData();
  buildSidebar();
  render();
  requestAnimationFrame(observeCards);
})();
</script>
